services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cxmind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cxmind_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cxmind"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      CXMIND_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/cxmind
      CXMIND_CORS_ORIGINS: http://localhost:5173,http://localhost
      CXMIND_ALLOW_MODEL_DOWNLOADS: "false"
      CXMIND_JWT_SECRET: "dev-secret-change-me"
      CXMIND_AUTH_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  cxmind_pg:
